<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<meta name="theme-color" content="#000000">

<title>Oráculo de La Santa Muerte</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:black;
font-family:serif;
touch-action:manipulation;
}

body{
position:relative;
}

/* OVERLAY */

body::before{

content:"";

position:absolute;
inset:0;

background:

radial-gradient(
circle at center,
transparent 45%,
rgba(0,0,0,0.35) 75%,
rgba(0,0,0,0.70) 100%
),

linear-gradient(
to bottom,
rgba(40,15,0,0.12),
rgba(0,0,0,0.30)
);

pointer-events:none;

z-index:0;
}

/* ALTAR */

#altar{

position:absolute;

width:100%;
height:100%;

opacity:0;

transition:2s;

overflow:hidden;

z-index:2;
}

/* CONTAINER SANTA */

.santa-container{

position:absolute;

top:50%;
left:50%;

width:100%;
height:100%;

transform:
translate(-50%,-50%);

animation:
breath 7s ease-in-out infinite;

z-index:2;
}

/* FUNDO RITUAL */

.ritual-bg{

position:absolute;

top:50%;
left:50%;

width:100%;
height:100%;

object-fit:cover;

transform:
translate(-50%,-50%);

z-index:1;

opacity:0.95;
}

/* IMAGEM SANTA */

.main-image{

position:absolute;

top:50%;
left:50%;

width:96%;
height:96%;

object-fit:cover;

transform:
translate(-50%,-50%);

z-index:2;
}

/* RESPIRAÇÃO */

@keyframes breath{

0%{
transform:
translate(-50%,-50%)
scale(1);
}

50%{
transform:
translate(-50%,-50%)
scale(1.018);
}

100%{
transform:
translate(-50%,-50%)
scale(1);
}

}

/* PARTÍCULAS */

.particle{

position:absolute;

width:3px;
height:3px;

border-radius:50%;

background:
rgba(255,210,120,0.90);

box-shadow:
0 0 10px rgba(255,210,120,0.95);

pointer-events:none;

z-index:3;

animation:
floatParticle linear infinite;
}

@keyframes floatParticle{

0%{
transform:
translateY(0);
opacity:0;
}

10%{
opacity:1;
}

100%{
transform:
translateY(-120vh);
opacity:0;
}

}

/* CONTAINER TEXTO */

.scroll-container{

position:absolute;

top:61.5%;
left:50%;

transform:
translate(-50%,-50%);

width:132px;
height:146px;

display:flex;

justify-content:center;
align-items:center;

padding:5px;

overflow:hidden;

z-index:10;
}

/* TEXTO */

.scroll-text{

position:relative;

width:100%;

text-align:center;

font-size:12.3px;

line-height:1.05;

color:#4a2410;

font-weight:bold;

word-wrap:break-word;

overflow:hidden;

transform:none;

text-shadow:
0 1px 0 rgba(255,255,255,0.08),
0 1px 2px rgba(0,0,0,0.22);

transition:1.5s;
}

/* BOTÃO ORÁCULO */

.button{

position:absolute;

bottom:96px;
left:50%;

transform:
translateX(-50%);

padding:
12px 24px;

border:none;

border-radius:30px;

background:
rgba(0,0,0,0.62);

color:#f3d7a0;

font-size:13px;

letter-spacing:1px;

white-space:nowrap;

z-index:20;

backdrop-filter:blur(6px);

box-shadow:
0 0 15px rgba(255,200,100,0.15);

transition:1s;
}

/* ENTRADA */

#welcome{

position:absolute;

width:100%;
height:100%;

overflow:hidden;

display:flex;

justify-content:center;
align-items:center;

z-index:100;
}

/* PORTAS */

.door-half{

position:absolute;

top:0;

width:50%;
height:100%;

background-image:url("door.png");

background-size:200% 100%;

background-repeat:no-repeat;

z-index:101;

transition:
2.4s cubic-bezier(.77,0,.18,1);
}

/* ESQUERDA */

.left-door{

left:0;

background-position:left center;
}

/* DIREITA */

.right-door{

right:0;

background-position:right center;
}

/* BOTÃO ENTRAR */

.enter-button{

position:relative;

padding:
18px 34px;

border:
1px solid rgba(255,230,180,0.4);

background:
rgba(0,0,0,0.62);

color:#f3d7a0;

font-size:18px;

letter-spacing:3px;

border-radius:40px;

backdrop-filter:blur(8px);

z-index:120;

box-shadow:
0 0 20px rgba(255,220,120,0.18);

transition:1s;
}

/* TRANSIÇÕES */

.fade-out{

animation:
fadeOutMagic 1.2s ease forwards;
}

.fade-in{

animation:
fadeInMagic 2s ease;
}

@keyframes fadeOutMagic{

0%{
opacity:1;
transform:translateY(0);
filter:blur(0);
}

100%{
opacity:0;
transform:translateY(-8px);
filter:blur(14px);
}

}

@keyframes fadeInMagic{

0%{
opacity:0;
transform:translateY(8px);
filter:blur(14px);
}

100%{
opacity:1;
transform:translateY(0);
filter:blur(0);
}

}

</style>
</head>

<body>

<!-- ENTRADA -->

<div id="welcome">

<div
class="door-half left-door"
id="leftDoor">
</div>

<div
class="door-half right-door"
id="rightDoor">
</div>

<button
class="enter-button"
id="enterButton"
onclick="enterAltar()">

✦ Entrar al Altar ✦

</button>

</div>

<!-- ALTAR -->

<div id="altar">

<div class="santa-container">

<img
class="ritual-bg"
src="ritual-bg.jpg">

<img
class="main-image"
src="background.jpg">

<div class="scroll-container">

<div
class="scroll-text"
id="scrollText">

Santa Muerte,
guía mis pensamientos,
protege mi espíritu
y aleja toda oscuridad
de mi camino.

Permite que mi alma
encuentre claridad,
paz y fuerza
para continuar.

Amén.

</div>

</div>

</div>

<button
class="button"
id="oracleButton"
onclick="revealOracle()">

✦ Revelar Oráculo ✦

</button>

</div>

<!-- MÚSICA -->

<audio
id="bgMusic"
loop
playsinline>

<source
src="https://files.catbox.moe/h6a4w1.mp3"
type="audio/mpeg">

</audio>

<script src="messages.js"></script>

<script>

/* ÁUDIO */

const audio =
document.getElementById("bgMusic");

audio.volume = 0.75;

/* VISITAS */

let visitCount =
localStorage.getItem("visitCount") || 0;

visitCount++;

localStorage.setItem(
"visitCount",
visitCount
);

/* TEXTO */

const text =
document.getElementById("scrollText");

/* ORAÇÃO ESPECIAL */

if(visitCount % 30 == 0){

text.innerHTML =

"Hoy La Santa Muerte camina más cerca de tu espíritu.<br><br>Que ninguna oscuridad toque tu alma y que toda herida se transforme en fuerza y claridad.<br><br>El altar te recibe bajo su protección.";

}

/* PARTÍCULAS */

for(let i=0;i<45;i++){

const particle =
document.createElement("div");

particle.classList.add("particle");

let side;

if(Math.random() < 0.5){

side = Math.random()*22;

}else{

side = 78 + Math.random()*22;

}

particle.style.left =
side + "vw";

particle.style.bottom =
"-10px";

particle.style.animationDuration =
(10 + Math.random()*12)+"s";

particle.style.animationDelay =
Math.random()*10+"s";

document.body.appendChild(particle);

}

/* ENTRAR */

function enterAltar(){

audio.play().catch(() => {});

if(navigator.vibrate){

navigator.vibrate(120);

}

const enterButton =
document.getElementById("enterButton");

enterButton.style.opacity="0";

setTimeout(()=>{

enterButton.style.display="none";

},500);

/* ALTAR */

document
.getElementById("altar")
.style.opacity="1";

/* PORTAS */

setTimeout(()=>{

document
.getElementById("leftDoor")
.style.transform=
"translateX(-100%)";

document
.getElementById("rightDoor")
.style.transform=
"translateX(100%)";

},300);

/* REMOVE INTRO */

setTimeout(()=>{

document
.getElementById("welcome")
.style.display="none";

},2600);

}

/* ORÁCULO */

function revealOracle(){

const button =
document.getElementById("oracleButton");

button.style.opacity="0";

setTimeout(()=>{

button.style.display="none";

},700);

text.classList.add("fade-out");

setTimeout(()=>{

const randomMessage =
messages[Math.floor(
Math.random()*messages.length)];

text.innerHTML =
randomMessage;

text.classList.remove("fade-out");

void text.offsetWidth;

text.classList.add("fade-in");

},1200);

}

</script>

</body>
</html>
