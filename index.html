<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>La Santa Muerte</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
font-family:Georgia,serif;
background:#000;
}

/* ========================= */
/* FUNDO AMBIENTE */
/* ========================= */

body{

background:

radial-gradient(circle at left,
rgba(120,50,0,0.10),
transparent 30%),

radial-gradient(circle at right,
rgba(120,50,0,0.10),
transparent 30%),

linear-gradient(
to bottom,
rgba(255,180,80,0.02),
transparent 20%
),

#000;
}

/* ========================= */
/* ALTAR */
/* ========================= */

#altar{

position:fixed;
inset:0;

display:flex;
justify-content:center;
align-items:center;

overflow:hidden;

z-index:1;
}

/* ========================= */
/* SANTA */
/* ========================= */

#bg{

position:absolute;

top:50%;
left:50%;

transform:
translate(-50%,-50%);

height:100%;
width:auto;

object-fit:contain;

z-index:1;

animation:
breath 7s ease-in-out infinite;
}

@keyframes breath{

0%{
transform:
translate(-50%,-50%)
scale(1);
}

50%{
transform:
translate(-50%,-50%)
scale(1.02);
}

100%{
transform:
translate(-50%,-50%)
scale(1);
}

}

/* ========================= */
/* TEXTO */
/* ========================= */

#textBox{

position:absolute;

top:66%;
left:50%;

transform:
translateX(-50%);

width:54%;
max-width:520px;

z-index:10;

text-align:center;

font-size:2rem;
line-height:1.14;

font-weight:bold;

color:#3a1c0f;

text-shadow:
0 2px 3px rgba(255,240,200,0.10),
0 2px 8px rgba(0,0,0,0.35);

animation:
textIn 1.6s ease;
}

@keyframes textIn{

from{
opacity:0;
filter:blur(12px);

transform:
translateX(-50%)
translateY(20px);
}

to{
opacity:1;
filter:blur(0px);

transform:
translateX(-50%)
translateY(0px);
}

}

.fadeOut{

animation:
textOut 1s forwards;
}

@keyframes textOut{

from{
opacity:1;
filter:blur(0px);

transform:
translateX(-50%)
translateY(0px);
}

to{
opacity:0;
filter:blur(12px);

transform:
translateX(-50%)
translateY(-24px);
}

}

/* ========================= */
/* BOTÃO ORÁCULO */
/* ========================= */

#oracleButton{

position:absolute;

bottom:5%;
left:50%;

transform:
translateX(-50%);

z-index:20;

background:
rgba(0,0,0,0.72);

color:#f2d3a0;

border:
2px solid rgba(255,220,120,0.18);

padding:16px 34px;

border-radius:40px;

font-size:1.2rem;

letter-spacing:2px;

box-shadow:
0 0 20px rgba(255,180,80,0.15);

transition:
0.7s;
}

.hideOracle{

opacity:0;

transform:
translateX(-50%)
scale(0.7);

filter:blur(10px);
}

/* ========================= */
/* INTRO */
/* ========================= */

#intro{

position:fixed;
inset:0;

z-index:9999;

overflow:hidden;
}

/* FUNDO ATRÁS DAS PORTAS */

#introBackground{

position:absolute;
inset:0;

background-image:url("background.jpg");

background-size:contain;
background-repeat:no-repeat;
background-position:center;

background-color:#000;

z-index:1;
}

/* ========================= */
/* PORTAS */
/* ========================= */

.door{

position:absolute;

top:0;

width:50%;
height:100%;

z-index:5;

overflow:hidden;

transition:
transform 2.3s cubic-bezier(.7,0,.2,1);
}

/* MESMA IMAGEM */

.door::before{

content:"";

position:absolute;

top:0;
height:100%;

width:200%;

background-image:url("door.png");

background-size:100% 100%;
background-repeat:no-repeat;
}

/* ESQUERDA */

.left{
left:0;
}

.left::before{
left:0;
}

/* DIREITA */

.right{
right:0;
}

.right::before{
right:0;
}

/* ABERTURA */

.open .left{
transform:translateX(-100%);
}

.open .right{
transform:translateX(100%);
}

/* ========================= */
/* BOTÃO ENTRAR */
/* ========================= */

#enterButton{

position:absolute;

left:50%;
top:77%;

transform:
translate(-50%,-50%);

z-index:10;

background:
rgba(0,0,0,0.72);

color:#f2d4a0;

border:
2px solid rgba(255,220,120,0.18);

padding:18px 34px;

border-radius:40px;

font-size:1.15rem;

letter-spacing:3px;

white-space:nowrap;

box-shadow:
0 0 20px rgba(255,180,80,0.15);

transition:
0.8s;
}

.hideButton{

opacity:0;

transform:
translate(-50%,-50%)
scale(0.7);

filter:blur(10px);
}

/* ========================= */
/* PARTÍCULAS */
/* ========================= */

.particle{

position:absolute;

width:3px;
height:3px;

border-radius:50%;

background:
rgba(255,210,120,0.78);

box-shadow:
0 0 10px rgba(255,190,90,0.8);

animation:
floatUp linear infinite;

z-index:2;
}

@keyframes floatUp{

from{
transform:translateY(0);
opacity:0;
}

20%{
opacity:1;
}

100%{
transform:translateY(-120vh);
opacity:0;
}

}

/* ========================= */
/* MOBILE */
/* ========================= */

@media(max-width:768px){

#bg{

width:100%;
height:auto;
}

#textBox{

width:58%;

top:67%;

font-size:1.05rem;

line-height:1.2;
}

#oracleButton{

font-size:1rem;

padding:14px 24px;
}

#enterButton{

font-size:1rem;

padding:16px 24px;

letter-spacing:2px;
}

}

</style>
</head>

<body>

<!-- ALTAR -->

<div id="altar">

<img
src="background.jpg"
id="bg">

<div id="textBox">

Santa Muerte,
guía mis pensamientos,
protege mi espíritu
y aleja toda oscuridad
de mi camino.

Permite que mi alma
encuentre claridad,
paz y fuerza
para continuar.

Amén.

</div>

<button id="oracleButton">

✦ Revelar Oráculo ✦

</button>

</div>

<!-- INTRO -->

<div id="intro">

<div id="introBackground"></div>

<div class="door left"></div>
<div class="door right"></div>

<button id="enterButton">

✦ Entrar al Altar ✦

</button>

</div>

<!-- ÁUDIO -->

<audio
id="music"
loop
playsinline>

<source
src="https://files.catbox.moe/h6a4w1.mp3"
type="audio/mpeg">

</audio>

<script>

/* ========================= */
/* FRASES */
/* ========================= */

const messages=[

"Lo que hoy parece confusión, mañana será revelación.",

"Tu intuición ya sabe lo que tu mente teme aceptar.",

"Hay caminos que solo se abren cuando dejas de forzarlos.",

"La oscuridad también protege aquello que aún no debe ser visto.",

"Escucha el silencio. Allí está la respuesta.",

"El miedo desaparece cuando aceptas tu transformación.",

"La Santa observa tus pasos en silencio.",

"Tu energía está cambiando esta noche."

];

/* ========================= */
/* ELEMENTOS */
/* ========================= */

const enterButton=
document.getElementById("enterButton");

const intro=
document.getElementById("intro");

const music=
document.getElementById("music");

const textBox=
document.getElementById("textBox");

const oracleButton=
document.getElementById("oracleButton");

/* ========================= */
/* ENTRAR */
/* ========================= */

enterButton.addEventListener("click",()=>{

music.volume=0.7;

music.play().catch(()=>{});

enterButton.classList.add("hideButton");

setTimeout(()=>{

intro.classList.add("open");

},400);

});

/* ========================= */
/* ORÁCULO */
/* ========================= */

oracleButton.addEventListener("click",()=>{

if(navigator.vibrate){

navigator.vibrate(120);

}

oracleButton.classList.add("hideOracle");

textBox.classList.add("fadeOut");

setTimeout(()=>{

const random=
messages[
Math.floor(Math.random()*messages.length)
];

textBox.innerHTML=random;

textBox.classList.remove("fadeOut");

void textBox.offsetWidth;

textBox.style.animation=
"textIn 1.6s ease";

},1000);

});

/* ========================= */
/* PARTÍCULAS */
/* ========================= */

for(let i=0;i<40;i++){

const p=
document.createElement("div");

p.classList.add("particle");

const leftSide=
Math.random()>0.5;

if(leftSide){

p.style.left=
(Math.random()*12)+"%";

}else{

p.style.left=
(88+Math.random()*12)+"%";
}

p.style.bottom="-20px";

p.style.animationDuration=
(8+Math.random()*10)+"s";

p.style.animationDelay=
Math.random()*10+"s";

document.body.appendChild(p);

}

</script>

</body>
</html>
